<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPE Tokenizer | Labs</title>
  </head>
  <body>
    <div class="container py-4" style="max-width: 960px">
      <h2 class="visually-hidden">Interactive BPE tokenizer. Pick a corpus, watch byte-pair encoding learn merges, then see how it splits your text.</h2>

      <div class="input-group mb-2">
        <input type="text" id="inp" class="form-control" value="the little cat sat by the door" placeholder="Enter some text to tokenize…" maxlength="120" />
        <button id="encode-btn" class="btn btn-primary">Tokenize ↗</button>
      </div>

      <div class="d-flex flex-wrap gap-1 mb-4" id="presets"></div>

      <div class="step-flow bg-body-tertiary rounded mb-4 p-1" id="steps"></div>

      <div id="panels"></div>

      <div class="d-flex justify-content-between mt-4">
        <button class="btn btn-outline-secondary" id="prev-btn">← Previous</button>
        <button class="btn btn-primary" id="next-btn">Next →</button>
      </div>
    </div>

    <script type="module" src="/src/ai/tokenizer/main.ts"></script>
  </body>
</html>
